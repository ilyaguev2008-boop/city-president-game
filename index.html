<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Футбол Live — Mini App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1116;
        --card: #171b23;
        --line: #283040;
        --text: #e8edf7;
        --muted: #a8b3c7;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .wrap {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 12px;
      }
      .header {
        margin-bottom: 12px;
      }
      .title {
        margin: 0 0 6px 0;
        font-size: 20px;
        font-weight: 700;
      }
      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .stream-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }
      .stream-head {
        padding: 8px 10px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid var(--line);
      }
      .frame-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .error {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--muted);
        padding: 10px;
        font-size: 12px;
      }
      .stream-card.blocked .error {
        display: flex;
      }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1 class="title">Футбольные трансляции</h1>
        <p class="hint">
          4 окошка в одном Mini App. Если источник запрещает встраивание, окно может остаться пустым.
        </p>
      </div>
      <div class="grid" id="streams-grid"></div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
